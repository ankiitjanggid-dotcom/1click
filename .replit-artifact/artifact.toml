kind = "web"
previewPath = "/digiworld/"
title = "1Klick2DigiWorld — Redesign"
version = "1.0.0"
id = "artifacts/digiworld"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/digiworld/" ]
localPort = 18570

[services.development]
run = "pnpm --filter @workspace/digiworld run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digiworld", "run", "build" ]
publicDir = "artifacts/digiworld/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18570"
BASE_PATH = "/digiworld/"
